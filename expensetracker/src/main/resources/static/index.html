<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-2px); }

        .stat-val { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 8px 0; }
        .stat-label { color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

        /* Form Styling */
        h2 { margin-top: 0; font-size: 1.25rem; color: var(--text); }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 4px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin: 8px 0 16px 0;
            border: 1.5px solid var(--border); border-radius: 10px;
            box-sizing: border-box; font-size: 1rem;
        }

        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .btn-save {
            background-color: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 10px; font-weight: 700;
            cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn-save:hover { background-color: #4f46e5; filter: brightness(1.1); }

        /* Table & Controls */
        .controls {
            width: 100%; max-width: 1200px;
            display: flex; gap: 15px; margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar { flex: 2; min-width: 250px; margin: 0; }
        .filter-dropdown { flex: 1; min-width: 150px; margin: 0; background-color: white; }

        .table-container { width: 100%; max-width: 1200px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        th { background-color: #f1f5f9; padding: 16px; text-align: left; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }

        .badge { padding: 6px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; background: #e0e7ff; color: #4338ca; }

        .btn-delete {
            background-color: #fee2e2; color: var(--danger); border: 1px solid #fecaca;
            padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .btn-delete:hover { background-color: var(--danger); color: white; border-color: var(--danger); }

        .fade-out { opacity: 0; transform: translateX(30px); transition: 0.4s; }
    </style>
</head>
<body>

<div class="dashboard-grid">
    <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <div class="stat-label">Total Spent</div>
        <div class="stat-val" id="totalAmount">₹0.00</div>
        <div class="stat-label" style="margin-top: 5px;"><span id="transactionCount" style="color: var(--primary)">0</span> Transactions</div>
    </div>

    <div class="card">
        <h2 style="font-size: 1rem; text-align: center; color: #64748b;">EXPENSE DISTRIBUTION</h2>
        <canvas id="expenseChart" style="max-height: 160px;"></canvas>
    </div>

    <div class="card">
        <h2>Add Transaction</h2>
        <form id="expenseForm" onsubmit="return handleFormSubmit(event)">
            <label>Description</label>
            <input type="text" name="description" id="formDesc" placeholder="e.g. Starbucks Coffee" required>

            <label>Amount (₹)</label>
            <input type="number" step="0.01" name="amount" id="formAmount" placeholder="0.00" required>

            <label>Category</label>
            <select name="category" id="formCat">
                <option value="Food">Food 🍕</option>
                <option value="Transport">Transport 🚗</option>
                <option value="Bills">Bills 📄</option>
                <option value="Shopping">Shopping 🛍️</option>
                <option value="Other">Other ✨</option>
            </select>

            <label>Date</label>
            <input type="date" name="date" id="datePicker" required>

            <button type="submit" class="btn-save">Save Expense</button>
        </form>
    </div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search description..." onkeyup="filterTable()">
    <select id="categoryFilter" class="filter-dropdown" onchange="filterTable()">
        <option value="All">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Bills">Bills</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
    </select>
</div>

<div class="table-container">
    <table id="mainTable">
        <thead>
        <tr>
            <th>#</th>
            <th>Transaction</th>
            <th>Category</th>
            <th>Date</th>
            <th>Amount</th>
            <th style="text-align: right;">Action</th>
        </tr>
        </thead>
        <tbody id="expenseBody"></tbody>
    </table>
</div>

<script>
    document.getElementById('datePicker').valueAsDate = new Date();
    let allExpenses = [];
    let myChart = null;

    async function loadExpenses() {
        try {
            const response = await fetch('/api/expenses');
            allExpenses = await response.json();
            renderData(allExpenses);
        } catch (error) {
            console.error('Error fetching data:', error);
        }
    }

    function validateForm() {
        const amount = document.getElementById('formAmount').value;
        if (amount <= 0) {
            alert("Amount must be a positive number.");
            return false;
        }
        return true;
    }

    async function handleFormSubmit(event) {
        event.preventDefault();

        const amount = parseFloat(document.getElementById('formAmount').value);
        if (amount <= 0) {
            alert("Amount must be a positive number.");
            return false;
        }

        const expense = {
            description: document.getElementById('formDesc').value,
            amount: amount,
            category: document.getElementById('formCat').value,
            date: document.getElementById('datePicker').value
        };

        try {
            const response = await fetch('/api/expenses', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(expense)
            });

            if (response.ok) {
                document.getElementById('expenseForm').reset();
                document.getElementById('datePicker').valueAsDate = new Date();
                await loadExpenses();
                alert('Expense saved successfully!');
            } else {
                alert('Failed to save expense: ' + response.statusText);
            }
        } catch (error) {
            console.error('Error saving expense:', error);
            alert('Error saving expense. Check console for details.');
        }

        return false;
    }

    function renderData(data) {
        const tableBody = document.getElementById('expenseBody');
        tableBody.innerHTML = '';
        let total = 0;

        data.forEach(expense => {
            total += expense.amount;
            const row = document.createElement('tr');
            row.id = `row-${expense.id}`;
            row.innerHTML = `
                <td style="font-weight: 600; color: var(--primary);">${expense.sequenceNo}</td>
                <td><span style="font-weight: 600;">${expense.description}</span></td>
                <td><span class="badge">${expense.category}</span></td>
                <td>${new Date(expense.date).toLocaleDateString()}</td>
                <td><span style="font-weight: 700; color: var(--text);">₹${expense.amount.toFixed(2)}</span></td>
                <td style="text-align: right;"><button class="btn-delete" onclick="deleteExpense(${expense.id})">Delete</button></td>
            `;
            tableBody.appendChild(row);
        });

        document.getElementById('totalAmount').innerText = `₹${total.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        document.getElementById('transactionCount').innerText = data.length;
        updateChart(data);
    }

    function updateChart(data) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const categories = [...new Set(data.map(ex => ex.category))];
        const totals = categories.map(cat =>
            data.filter(ex => ex.category === cat).reduce((sum, ex) => sum + ex.amount, 0)
        );

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: categories,
                datasets: [{
                    data: totals,
                    backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                cutout: '70%',
                plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, padding: 15 } } }
            }
        });
    }

    function filterTable() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('categoryFilter').value;

        const filtered = allExpenses.filter(ex => {
            const matchesSearch = ex.description.toLowerCase().includes(term);
            const matchesCategory = (catFilter === "All" || ex.category === catFilter);
            return matchesSearch && matchesCategory;
        });

        renderData(filtered);
    }

    async function deleteExpense(id) {
        if(confirm("Permanently delete this transaction?")) {
            try {
                const response = await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
                if(response.ok) {
                    const row = document.getElementById(`row-${id}`);
                    if(row) row.classList.add('fade-out');
                    setTimeout(() => loadExpenses(), 400);
                } else {
                    alert("Delete failed. Item may have already been removed.");
                    loadExpenses();
                }
            } catch (error) {
                alert("Network error. Please check your connection.");
            }
        }
    }

    window.onload = loadExpenses;
</script>

</body>
</html>
